##### Catppuccin theme ########################################################

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

set -g @thm_bg "default"

##### Task / agent icons ######################################################

set -g @task_icon_idle ""
set -g @task_icon_busy "󱚣 "
set -g @task_icon_wait "󰮥 "
set -g @task_icon_input "󰀦 "
set -g @task_icon_success "󰜡"
set -g @task_icon_fail " "

set -g @agent_status_enabled "off"
# set -g @agent_status_enabled "on"
set -g @agent_status_separator "│"
set -g @agent_monitor_status ""
set -g @agent_monitor_attention_timeout 300
set -g @agent_monitor_notify_enabled "on"
set -g @agent_monitor_notify_tmux_apps "Ghostty Terminal iTerm2 WezTerm kitty Alacritty"
bind-key -n MouseDown1Status if -F "#{==:#{mouse_status_range},pane}" "select-pane -t =" "if -F '#{==:#{mouse_status_range},window}' 'select-window -t ='"
set-hook -g pane-exited 'run-shell -b "~/dotfiles/tmux/scripts/agent-monitor-prune.sh"'
set-hook -g after-kill-pane 'run-shell -b "~/dotfiles/tmux/scripts/agent-monitor-prune.sh"'
set-hook -g after-kill-window 'run-shell -b "~/dotfiles/tmux/scripts/agent-monitor-prune.sh"'

##### Pane / window appearance ################################################

# Make the active pane obvious at a glance.
setw -g pane-border-status top
setw -g pane-border-style "fg=#{@thm_overlay_0}"
setw -g pane-active-border-style "fg=#{@thm_peach},bold"
setw -g pane-border-format "#{?pane_active,#[fg=#{@thm_peach}]#[bold] 󰄛 #{pane_current_command} ,#[fg=#{@thm_overlay_0}] #{pane_current_command} }"

# Prefix + q pane numbers.
set -g display-panes-colour "#{@thm_overlay_0}"
set -g display-panes-active-colour "#{@thm_peach}"

# Window status styles.
set -g window-status-format " #I#{?#{!=:#{window_name},Window}, #W,} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]|"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window}, #W,} "
set -g window-status-current-style "fg=#{@thm_peach},bold"
