##### Panes / windows / sessions #############################################

unbind %
bind-key | split-window -h

unbind '"'
bind-key - split-window -v

bind-key h resize-pane -L 5
bind-key j resize-pane -D 5
bind-key k resize-pane -U 5
bind-key l resize-pane -R 5

# Switch between the two most recent windows.
unbind-key -T prefix w
bind-key -T prefix w last-window

# Switch between the two most recent sessions.
bind-key -T prefix Tab switch-client -l

# Show raw sessions.
bind-key C-c choose-session

##### Popups / utilities ######################################################

# Switch recent projects with fzf + zoxide via tmux-bro.
bind-key t display-popup -E "tmux-bro"

# Show sessions with fzf search input.
bind-key s run-shell -b "~/dotfiles/tmux/scripts/session-switcher.sh --popup"

# Show sessions with Claude Code status.
bind-key m display-popup -E "~/.cargo/bin/claude-tmux"

##### Copy mode ###############################################################

# Start selecting text with v, copy with y.
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection

# Don't exit copy mode when dragging with mouse.
unbind-key -T copy-mode-vi MouseDragEnd1Pane
