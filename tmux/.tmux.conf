##### Terminal / shell #########################################################

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",tmux-256color:RGB"
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'

set-option -g default-shell /opt/homebrew/bin/fish
set -g mouse on
set -g focus-events on

# Remove delay for exiting insert mode with ESC in Neovim.
set -sg escape-time 10

# Enable CSI-u / extended keys.
set -g extended-keys on
set -g extended-keys-format csi-u
set -g allow-passthrough on


##### Prefix / reload #########################################################

set -g prefix C-s
unbind C-b
bind-key C-s send-prefix

unbind r
bind-key r source-file ~/.tmux.conf


##### Panes / windows / sessions #############################################

unbind %
bind-key | split-window -h

unbind '"'
bind-key - split-window -v

bind-key h resize-pane -L 5
bind-key j resize-pane -D 5
bind-key k resize-pane -U 5
bind-key l resize-pane -R 5

# Switch between the two most recent windows.
unbind-key -T prefix w
bind-key -T prefix w last-window

# Switch between the two most recent sessions.
bind-key -T prefix Tab switch-client -l

# Show raw sessions.
bind-key C-c choose-session

set-window-option -g mode-keys vi
set -wg automatic-rename on
set -g automatic-rename-format "Window"


##### Popups / utilities ######################################################

# Switch recent projects with fzf + zoxide via tmux-bro.
bind-key t display-popup -E "tmux-bro"

# Show sessions with search input.
bind-key s display-popup -E "bash ~/dotfiles/tmux/scripts/session-switcher.sh"

# Show sessions with Claude Code status.
bind-key m display-popup -E "~/.cargo/bin/claude-tmux"


##### Copy mode ###############################################################

# Start selecting text with v, copy with y.
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection

# Don't exit copy mode when dragging with mouse.
unbind-key -T copy-mode-vi MouseDragEnd1Pane

set -g @fingers-key F


##### Plugins ################################################################

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'        # Persist sessions after restart.
set -g @plugin 'tmux-plugins/tmux-continuum'        # Auto-save sessions every 15 minutes.
set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'xamut/tmux-network-bandwidth'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'jaclu/tmux-power-zoom'
set -g @plugin 'tmux-plugins/tpm'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Bootstrap TPM if missing.
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"


##### Theme ##################################################################

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

set -g @thm_bg "default"

# Task icons.
set -g @task_icon_idle ""
set -g @task_icon_busy "󱚣 "
set -g @task_icon_wait "󰮥 "
set -g @task_icon_input "󰀦 "
set -g @task_icon_success "󰜡"
set -g @task_icon_fail " "

# AI agent status. Edit these to tune the topbar widget.
set -g @agent_status_enabled "on"
set -g @agent_status_harnesses "pi opencode codex"
set -g @agent_status_involve_states "needs-input failed"
set -g @agent_status_list_limit 2


##### Status line #############################################################

set -g status-position top
set -g status 1
set -g status-justify "right"
set -g status-interval 8
set -g status-bg "default"

# Left status.
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=#{@thm_bg},fg=#{@thm_green}]  #S }}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag, 󰁌 ZOOM ,}"

# Right status.
set -g status-right ""
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_mauve}] 󰖳 "

# Example status item.
# set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_mauve}] 󰻠 #{cpu_percentage} "

# Single-row topbar: original left, agent monitor center, window list + original right.
set -g status-format[0] "#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[align=centre]#(~/dotfiles/tmux/scripts/agent-status.sh)#[align=right]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{window-status-separator}}}#[nolist range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]"

##### Pane / window appearance ################################################

# Make the active pane obvious at a glance.
setw -g pane-border-status top
setw -g pane-border-style "fg=#{@thm_overlay_0}"
setw -g pane-active-border-style "fg=#{@thm_peach},bold"
setw -g pane-border-format "#{?pane_active,#[fg=#{@thm_peach}]#[bold] 󰄛 ACTIVE #P ,#[fg=#{@thm_overlay_0}] pane #P }"

# Prefix + q pane numbers.
set -g display-panes-colour "#{@thm_overlay_0}"
set -g display-panes-active-colour "#{@thm_peach}"

set -g window-status-format " #I#{?#{!=:#{window_name},Window}, #W,} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]|"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window}, #W,} "
set -g window-status-current-style "fg=#{@thm_peach},bold"


##### TPM ####################################################################

# Initialize TMUX plugin manager. Keep this line at the very bottom.
run '~/.tmux/plugins/tpm/tpm'
