##### Status line #############################################################

set -g status-position top
set -g status on
set -g status-justify "right"
set -g status-interval 3
set -g status-bg "default"

# ── Left status ──────────────────────────────────────────────────────────────

set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=#{@thm_bg},fg=#{@thm_green}]  #S }}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag, 󰁌 ZOOM ,}"

# ── Right status ─────────────────────────────────────────────────────────────

set -g status-right ""
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_mauve}] 󰖳 "

# Example: CPU usage widget (uncomment to enable).
# set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_mauve}] 󰻠 #{cpu_percentage} "

# ── Status format (single-row topbar) ────────────────────────────────────────

set -g status-format[0] "\
#[align=left range=left #{E:status-left-style}]\
#[push-default]#{T;=/#{status-left-length}:status-left}\
#[pop-default]#[norange default]\
#[align=centre]#{E:@agent_monitor_status}\
#[align=right]\
#[list=on align=#{status-justify}]\
#[list=left-marker]<#[list=right-marker]>\
#[list=on]\
#{W:\
#[range=window|#{window_index} #{E:window-status-style}\
#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}\
#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},\
#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]\
#[push-default]#{T:window-status-format}\
